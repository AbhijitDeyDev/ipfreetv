<GridLayout columns="*"
            rows="50, *"
            class="dark:bg-gray-800">
    <header row="0"
            title="Favorite Channels"
            [hideBackBtn]="true"
            [showSearch]="!!channels().length"
            (searchInputChange)="onSearchInputChange($event)"></header>

    <channel-list row="1"
                  [channels]="channels()"></channel-list>

    <StackLayout row="1"
                 verticalAlignment="center"
                 class="p-8"
                 [hidden]="!!channels().length">
        <Image src="~/assets/icons/favorite.png"
               width="50"
               height="50"
               tintColor="#08CB00"
               class="mb-5" />
        <label text="No favorite channels found"
               textWrap="true"
               textTransform="none"
               class="dark:text-white text-center text-lg mb-5"></label>
        <label text="Add any channel to favorite by long pressing on the channel"
               textWrap="true"
               textTransform="none"
               class="text-(--secondary) dark:text-green-100 text-xl text-center"></label>
    </StackLayout>
</GridLayout>
