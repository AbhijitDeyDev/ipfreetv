<GridLayout columns="*"
            rows="50, *"
            class="dark:bg-gray-800">
    <header row="0"
            [title]="'All '+ (channels().length) +' channels'"
            [hideBackBtn]="true"
            [showSearch]="true"
            (searchInputChange)="onSearchInputChange($event)"></header>

    <channel-list row="1"
                  [channels]="channels()"></channel-list>

    <StackLayout row="1"
                 verticalAlignment="center"
                 class="p-8"
                 [hidden]="!!channels().length">
        <NSImg src="~/assets/icons/all-channel.png"
               width="50"
               height="50"
               tintColor="#08CB00"
               class="mb-5" />
        <label text="No channel found"
               textWrap="true"
               textTransform="none"
               class="text-center text-lg mb-5"></label>
    </StackLayout>
</GridLayout>
